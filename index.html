  <script type="text/javascript">
    (function () {
      var path = window.location.pathname;
      var manifest = '/manifest.json';
      var title = 'PasseVite';

      if (path.startsWith('/manager')) {
        manifest = '/manifest-manager.json';
        title = 'PV manager';
      } else if (path.startsWith('/accueil')) {
        manifest = '/manifest-accueil.json';
        title = 'PV accueil';
      } else if (path.startsWith('/doctor')) {
        manifest = '/manifest-doctor.json';
        title = 'PV doctor';
      }

      var link = document.createElement('link');
      link.rel = 'manifest';
      link.href = manifest;
      document.head.appendChild(link);

      var metaTitle = document.createElement('meta');
      metaTitle.name = 'apple-mobile-web-app-title';
      metaTitle.content = title;
      document.head.appendChild(metaTitle);
    })();
  </script>

  <!-- PWA & iOS Safari Full Screen Tags -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>

<body>
  <div id="root"></div>
  <script type="text/javascript">
    // Fix for iOS standalone mode links opening in Safari
    (function (document, navigator, standalone) {
      if ((standalone in navigator) && navigator[standalone]) {
        var curnode, location = document.location, stop = /^(a|html)$/i;
        document.addEventListener('click', function (e) {
          curnode = e.target;
          while (!(stop).test(curnode.nodeName)) {
            curnode = curnode.parentNode;
          }
          if ('href' in curnode && (curnode.href.indexOf('http') || ~curnode.href.indexOf(location.host)) && (!curnode.target || curnode.target == '_self')) {
            e.preventDefault();
            location.href = curnode.href;
          }
        }, false);
      }
    })(document, window.navigator, 'standalone');
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
